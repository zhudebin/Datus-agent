  # GLM Models (Coding Plan)
  glm-5:
    context_length: 200000
    max_tokens: 131072
  glm-4.7:
    context_length: 200000
    max_tokens: 131072
  glm-4.5-air:
    context_length: 128000
    max_tokens: 8192
  glm-4.5-flash:
    context_length: 128000
