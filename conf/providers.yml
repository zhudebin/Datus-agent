# LLM Provider catalog for interactive init (`datus-cli init`)
# Add new providers/models here without changing Python code.

providers:
  openai:
    type: openai
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    default_model: gpt-4.1
    models:
      - gpt-5.2
      - gpt-4.1
      - gpt-4.1-mini
      - o3
      - o3-pro
      - o4-mini

  deepseek:
    type: deepseek
    base_url: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY
    default_model: deepseek-chat
    models:
      - deepseek-chat
      - deepseek-reasoner

  claude:
    type: claude
    base_url: https://api.anthropic.com
    api_key_env: ANTHROPIC_API_KEY
    default_model: claude-sonnet-4-5
    models:
      - claude-haiku-4-5
      - claude-sonnet-4-5
      - claude-opus-4-5
      - claude-sonnet-4
      - claude-opus-4

  kimi:
    type: kimi
    base_url: https://api.moonshot.cn/v1
    api_key_env: KIMI_API_KEY
    default_model: kimi-k2.5
    models:
      - kimi-k2.5
      - kimi-k2-turbo-preview
      - kimi-k2-0905-Preview
      - kimi-k2-thinking

  qwen:
    type: openai
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key_env: DASHSCOPE_API_KEY
    default_model: qwen3-max
    models:
      - qwen3-max
      - qwen3-coder-plus
      - qwen-plus
      - qwen-flash

  gemini:
    type: gemini
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key_env: GEMINI_API_KEY
    default_model: gemini-2.5-flash
    models:
      - gemini-2.5-flash
      - gemini-2.5-pro
      - gemini-3-flash-preview
      - gemini-3-pro-preview

  minimax:
    type: minimax
    base_url: https://api.minimaxi.com/v1
    default_model: MiniMax-M2.7
    models:
      - MiniMax-M2.7
      - MiniMax-M2.5

  glm:
    type: glm
    base_url: https://open.bigmodel.cn/api/paas/v4
    default_model: glm-5
    models:
      - glm-5
      - glm-4.7
      - glm-4.5-air
      - glm-4.5-flash

  # Coding Plan providers (Chinese vendor Anthropic-compatible endpoints)
  alibaba_coding:
    type: claude
    base_url: https://coding-intl.dashscope.aliyuncs.com/apps/anthropic
    default_model: qwen3-coder-plus
    models:
      - qwen3-coder-plus
      - qwen3.5-plus
      - glm-5
      - kimi-k2.5
      - MiniMax-M2.5

  glm_coding:
    type: claude
    base_url: https://open.bigmodel.cn/api/anthropic
    default_model: glm-5
    models:
      - glm-5

  minimax_coding:
    type: claude
    base_url: https://api.minimaxi.com/anthropic
    default_model: MiniMax-M2.7
    models:
      - MiniMax-M2.7

  kimi_coding:
    type: claude
    base_url: https://api.kimi.com/coding/
    default_model: kimi-for-coding
    models:
      - kimi-for-coding

  # Claude subscription (Pro/Max plan via setup-token)
  claude_subscription:
    type: claude
    auth_type: subscription
    base_url: https://api.anthropic.com
    default_model: claude-sonnet-4-6
    models:
      - claude-sonnet-4-6
      - claude-opus-4-6
      - claude-haiku-4-5

  # Codex (ChatGPT Plus/Pro subscription via OAuth)
  codex:
    type: codex
    auth_type: oauth
    base_url: https://chatgpt.com/backend-api/codex
    default_model: codex-mini-latest
    models:
      - codex-mini-latest

# Model-specific parameter overrides
# Some models enforce fixed values; these are auto-applied during init.
model_overrides:
  kimi-k2.5:
    temperature: 1.0
    top_p: 0.95
  qwen3-coder-plus:
    temperature: 1.0
    top_p: 0.95

# Model specifications: context_length and max_tokens for each model.
# Used for token budget management. Prefix matching is applied at runtime
# (e.g. "gpt-4o-mini" matches "gpt-4o", "kimi-k2-0711-preview" matches "kimi-k2").
model_specs:
  # OpenAI Models
  gpt-5:
    context_length: 400000
    max_tokens: 128000
  gpt-4.1:
    context_length: 400000
    max_tokens: 128000
  gpt-4o:
    context_length: 128000
    max_tokens: 16384
  o3:
    context_length: 200000
    max_tokens: 200000
  o4:
    context_length: 200000
    max_tokens: 200000

  # DeepSeek Models
  deepseek-chat:
    context_length: 65535
    max_tokens: 8192
  deepseek-v3:
    context_length: 65535
    max_tokens: 8192
  deepseek-reasoner:
    context_length: 65535
    max_tokens: 65535
  deepseek-r1:
    context_length: 65535
    max_tokens: 65535

  # Moonshot (Kimi) Models
  kimi-k2:
    context_length: 256000
    max_tokens: 8192
  kimi-k2.5:
    context_length: 256000
    max_tokens: 16384
  kimi-k2-turbo:
    context_length: 256000
    max_tokens: 8192

  # Qwen Models
  qwen3-coder:
    context_length: 128000
    max_tokens: 8192
  qwen3.5-plus:
    context_length: 1000000
    max_tokens: 16384
  qwen3-coder-plus:
    context_length: 1000000
