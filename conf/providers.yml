  # MiniMax Models (Coding Plan)
  MiniMax-M2.5:
    context_length: 204800
    max_tokens: 16384
  MiniMax-M2.7:
    context_length: 204800
    max_tokens: 16384

  # Kimi Coding Plan
  kimi-for-coding:
    context_length: 256000
    max_tokens: 8192

  # Claude Models
  claude-sonnet-4-5:
    context_length: 1048576
    max_tokens: 65536
  claude-opus-4-1:
    context_length: 200000
    max_tokens: 32000
  claude-opus-4:
    context_length: 200000
    max_tokens: 32000
  claude-sonnet-4:
    context_length: 1048576
    max_tokens: 65536
  claude-3-7-sonnet:
    context_length: 200000
    max_tokens: 128000

  # Gemini Models
  gemini-2.5-pro:
    context_length: 1048576
    max_tokens: 65535
  gemini-2.5-flash:
    context_length: 1048576
    max_tokens: 8192
  gemini-2.5-flash-lite:
