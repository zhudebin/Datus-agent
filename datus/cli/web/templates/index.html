<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="https://docs.datus.ai/assets/logo-light.png" />
    <title>Datus Chatbot</title>

    <!-- React (externals) -->
    <script
      crossorigin
      src="{{ react_js }}"
    ></script>
    <script
      crossorigin
      src="{{ react_dom_js }}"
    ></script>

    <!-- Datus Chatbot -->
    <link rel="stylesheet" href="{{ chatbot_css }}" />
    <script src="{{ chatbot_js }}"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
      }

      #chatbot-root {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="chatbot-root"></div>

    <script>
      DatusChatbot.initChatbot({
        el: '#chatbot-root',
        requestOrigin: {{ request_origin_json }} || window.location.origin,
        userName: {{ user_name_json }} || 'User',
      });
    </script>
  </body>
</html>
